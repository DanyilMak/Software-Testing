version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: lab7_postgres
    restart: always
    environment:
      POSTGRES_DB: studentsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: